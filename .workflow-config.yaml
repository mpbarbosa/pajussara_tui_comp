# AI Workflow Automation Configuration
# Project: pajussara_tui_comp
# See: https://github.com/mpbarbosa/ai_workflow.js

project:
  name: "pajussara_tui_comp"
  type: "typescript-library"
  kind: "typescript_library"   # Ink TUI component library (React/TypeScript)
  version: "1.1.4"             # keep in sync with package.json
  description: "Ink TUI Component Library in TypeScript"
  target_users: "Developers building Ink-based TUIs in TypeScript"
  design_system: "None — terminal UI only (Ink Box/Text primitives)"

tech_stack:
  primary_language: "typescript"
  build_system: "tsc"           # tsc compiles src/**/*.tsx → dist/
  test_framework: "jest"
  test_runner: "ts-jest"        # TypeScript test runner
  test_command: "npm test"
  lint_command: "npm run lint"
  build_command: "npm run build"
  node_version: ">=20.0.0"

structure:
  source_dirs:
    - src
    - helpers            # shared display utilities (formatStepIcon, statusColor, formatDuration)
  test_dirs:
    - test
  docs_dirs:
    - docs
  build_output: "dist"

# ============================================================================
# AI PERSONAS
# ============================================================================
# Personas selected for this project (TypeScript Ink TUI component library —
# React/Ink-based, keyboard-navigable terminal UI components, no web/HTML).
#
# ENABLED — matched to this project's stack and characteristics:
#   typescript_reviewer        — TypeScript primary language; strict prop types, generics on
#                                components; interfaces over type aliases
#   test_engineer              — Jest + ts-jest; test coverage for component rendering,
#                                keyboard navigation, scrolling windows
#   code_quality_analyst       — ESLint, React/Ink patterns, anti-patterns in TUI components
#   architecture_reviewer      — Component API surface design, prop contracts, composition
#   documentation_expert       — JSDoc with @fileoverview/@module headers, API docs (docs/)
#   technical_writer           — README, CHANGELOG, markdown docs
#   git_specialist             — Conventional commits, semver tagging, versioning
#   devops_engineer            — tsconfig.json, jest.config.json, package.json validation
#   dependency_analyst         — ink, react, @types/react devDep audit
#   async_performance_engineer — useEffect, useInput, keyboard event handling, React re-renders
#   ux_analyst                 — TUI UX: keyboard navigation patterns, focus management,
#                                visual hierarchy in terminal layouts
#
# DISABLED — not applicable:
#   prompt_engineer         — not an AI/prompt project
#   accessibility_expert    — no HTML/CSS layer (Ink renders to terminal, not DOM)
#   aws_serverless_engineer — no AWS infrastructure
#   api_designer            — not an HTTP API server
#   security_expert         — no auth/secrets; covered by dependency_analyst
#   performance_engineer    — TUI rendering perf covered by async_performance_engineer

ai_personas:
  enabled:
    - typescript_reviewer
    - test_engineer
    - code_quality_analyst
    - architecture_reviewer
    - documentation_expert
    - technical_writer
    - git_specialist
    - devops_engineer
    - dependency_analyst
    - async_performance_engineer
    - ux_analyst
  disabled:
    - prompt_engineer
    - accessibility_expert
    - aws_serverless_engineer
    - api_designer
    - security_expert
    - performance_engineer

# ============================================================================
# WORKFLOW EXECUTION CONFIGURATION
# ============================================================================

workflow:
  settings:
    auto_mode: false
    parallel_execution: true
    smart_execution: true        # Skip steps based on change detection
    ml_optimize: false
    multi_stage: false
    auto_commit: false

  stages:
    quick:
      enabled: true
      steps: [step_00, step_01, step_02]
    medium:
      enabled: true
      steps: [step_00, step_01, step_02, step_03, step_04, step_05]
    full:
      enabled: true
      steps: [step_00, step_0b, step_01, step_02, step_02_5, step_03, step_04,
              step_05, step_06, step_07, step_08, step_09, step_10, step_13,
              step_19, step_20, step_15, step_11, step_16, step_17, step_0f, step_12]

  steps:

    # -------------------------------------------------------------------------
    # PRE-PROCESSING
    # -------------------------------------------------------------------------

    - id: "00"
      name: "Pre-Analysis"
      file: "step_00_analyze.js"
      description: "Detect project kind and analyze changed TypeScript/test/doc files"
      phase: "analysis"
      enabled: true
      can_parallelize: false
      dependencies: []

    # -------------------------------------------------------------------------
    # DOCUMENTATION
    # -------------------------------------------------------------------------

    - id: "0b"
      name: "Bootstrap Documentation"
      file: "step_0b_bootstrap_docs.js"
      description: "Draft API docs for new components not yet covered in docs/"
      phase: "analysis"
      enabled: true
      can_parallelize: false
      dependencies: ["00"]
      ai_persona: "technical_writer"
      optional: true

    - id: "01"
      name: "Documentation Updates"
      file: "step_01_documentation.js"
      description: "Update API docs and README to reflect component changes"
      phase: "analysis"
      enabled: true
      can_parallelize: true
      dependencies: ["00"]
      ai_persona: "documentation_expert"

    - id: "02"
      name: "Consistency Check"
      file: "step_02_consistency.js"
      description: "Validate cross-document coherence across component API docs"
      phase: "analysis"
      enabled: true
      can_parallelize: true
      dependencies: ["01"]
      ai_persona: "documentation_expert"

    - id: "02_5"
      name: "Documentation Optimization"
      file: "step_02_5_doc_optimize.js"
      description: "Reduce redundancy in API docs and improve clarity"
      phase: "analysis"
      enabled: true
      can_parallelize: true
      dependencies: ["02"]
      ai_persona: "technical_writer"

    - id: "03"
      name: "Script References"
      file: "step_03_script_refs.js"
      description: "Validate code references and examples in documentation"
      phase: "analysis"
      enabled: true
      can_parallelize: true
      dependencies: ["02"]
      ai_persona: "devops_engineer"

    - id: "13"
      name: "Markdown Linting"
      file: "step_13_markdown_lint.js"
      description: "Lint markdown files"
      phase: "analysis"
      enabled: true
      can_parallelize: true
      dependencies: ["01"]
      ai_persona: "technical_writer"

    # -------------------------------------------------------------------------
    # VALIDATION
    # -------------------------------------------------------------------------

    - id: "04"
      name: "Configuration Validation"
      file: "step_04_config_validation.js"
      description: "Validate tsconfig.json, jest.config.json, package.json"
      phase: "validation"
      enabled: true
      can_parallelize: true
      dependencies: ["00"]
      ai_persona: "devops_engineer"

    - id: "05"
      name: "Directory Structure"
      file: "step_05_directory.js"
      description: "Validate src/ and test/ structure matches component-per-file convention"
      phase: "validation"
      enabled: true
      can_parallelize: false
      dependencies: ["04"]
      ai_persona: "architecture_reviewer"

    # -------------------------------------------------------------------------
    # TESTING
    # -------------------------------------------------------------------------

    - id: "06"
      name: "Test Review"
      file: "step_06_test_review.js"
      description: "Review Jest + ts-jest tests for coverage gaps and quality"
      phase: "testing"
      enabled: true
      can_parallelize: false
      dependencies: ["05"]
      ai_persona: "test_engineer"

    - id: "07"
      name: "Test Generation"
      file: "step_07_test_gen.js"
      description: "Generate missing tests (keyboard navigation, scrolling, focus, props)"
      phase: "testing"
      enabled: true
      can_parallelize: false
      dependencies: ["06"]
      ai_persona: "test_engineer"

    - id: "08"
      name: "Test Execution"
      file: "step_08_test_exec.js"
      description: "Run npm test and verify coverage threshold"
      phase: "testing"
      enabled: true
      can_parallelize: false
      dependencies: ["07"]
      ai_persona: "test_engineer"

    # -------------------------------------------------------------------------
    # QUALITY & ANALYSIS
    # -------------------------------------------------------------------------

    - id: "09"
      name: "Dependency Analysis"
      file: "step_09_dependencies.js"
      description: "Audit ink, react, @types/* dependencies"
      phase: "quality"
      enabled: true
      can_parallelize: true
      dependencies: ["08"]
      ai_persona: "dependency_analyst"

    - id: "10"
      name: "Code Quality"
      file: "step_10_code_quality.js"
      description: "TypeScript quality, Ink component patterns, tech debt"
      phase: "quality"
      enabled: true
      can_parallelize: true
      dependencies: ["09"]
      ai_persona: "code_quality_analyst"

    - id: "19"
      name: "TypeScript Review"
      file: "step_19_typescript_review.js"
      description: "Strict-mode compliance, prop interfaces, type-safety review"
      phase: "quality"
      enabled: true
      can_parallelize: true
      dependencies: ["10"]
      ai_persona: "typescript_reviewer"

    - id: "20"
      name: "Async/Event Review"
      file: "step_20_async_perf_review.js"
      description: "useInput event handling, useEffect cleanup, re-render analysis"
      phase: "quality"
      enabled: true
      can_parallelize: true
      dependencies: ["10"]
      ai_persona: "async_performance_engineer"

    - id: "15"
      name: "TUI UX Review"
      file: "step_15_ux_analysis.js"
      description: "TUI component UX review: keyboard navigation, focus management, visual hierarchy in terminal layouts"
      phase: "quality"
      enabled: true
      can_parallelize: true
      dependencies: ["10"]
      ai_persona: "ux_analyst"
      custom_prompt:
        task: >
          Review the ListPanel Ink TUI component for terminal-native UX quality.
          Focus on keyboard navigation patterns, focus management, visual hierarchy
          in the terminal, and developer experience of the component API.
          Do NOT apply web/mobile heuristics (no WCAG pixel ratios, no touch targets,
          no responsive breakpoints, no gesture support).
        project_context:
          source_files:
            - "src/ListPanel.tsx"         # main component implementation
            - "helpers/index.ts"          # formatStepIcon, statusColor, formatDuration
            - "docs/usability-heuristics.md"  # Nielsen heuristics mapped to TUI features
          component: "ListPanel"
          props:
            - "items: Record<string, ListItem> — map of id → item data"
            - "currentItemId: string | null — active/running item (auto-scrolled into view)"
            - "selectedItemId: string | null — externally-controlled cursor position"
            - "onSelectItem: (id: string) => void — fires on ↑/↓/k/j keypress"
            - "isFocused: boolean — enables useInput keyboard handler"
            - "width / height: number — panel dimensions in terminal columns/rows"
            - "title: string — header label (default: 'STEPS')"
            - "emptyText: string — shown when items is empty"
          status_values: "pending (○ gray) | running (● cyan) | done (✔ green) | error (✘ red)"
          keyboard_shortcuts: "↑/k = up, ↓/j = down"
        analysis_phase:
          - "Keyboard Navigation: Are ↑/↓/k/j handled correctly? Does isFocused guard prevent key capture when unfocused?"
          - "Focus Management: Does the border color change (white=focused, gray=unfocused) give sufficient affordance? Is the selected item cursor (>) visible?"
          - "Scroll UX: Does the scroll window follow currentItemId reliably? Is the viewport height calculation (height - 2) sensible?"
          - "Status Clarity: Are status icons (○ ● ✔ ✘) and colors (gray/cyan/green/red) unambiguous in a terminal?"
          - "Empty State: Is emptyText shown clearly when items is empty?"
          - "Duration Display: Is formatDuration output (e.g. '4.5s', '1m 4s') readable and correctly placed?"
          - "Component API: Are prop names intention-revealing? Is the ListItem interface minimal and clear?"
          - "Developer Experience: Is the onSelectItem callback contract obvious? Are defaults sensible?"
        required_actions:
          keyboard_ux:
            - "Verify isFocused=false fully suppresses keyboard events (useInput { isActive: isFocused })"
            - "Check that rapid ↑/↓ keystrokes don't cause cursor to jump past list boundaries"
            - "Confirm selectedItemId clamps to valid range when items change"
            - "Evaluate whether k/j vim-style shortcuts are documented in README"
          focus_and_visual:
            - "Assess border color distinction (white vs gray) — is it obvious enough in typical terminal themes?"
            - "Verify the '>' cursor indicator is visible on all status/color combinations"
            - "Check that selected item highlight (cyan) doesn't clash with 'running' status color (also cyan)"
            - "Confirm title prop renders with sufficient visual weight to identify the panel"
          scroll_and_layout:
            - "Verify scroll window stays centered around currentItemId when list is long"
            - "Test that height prop respects the -2 row budget for title and borders"
            - "Confirm item name truncation prevents overflow beyond panel width"
          api_quality:
            - "Check that ListItem.id matches the key in the items Record (consistency)"
            - "Verify onSelectItem is not called when isFocused=false"
            - "Assess whether emptyText default ('Waiting for steps…') is generic enough"
            - "Confirm StepsPanel deprecated alias is documented with @deprecated JSDoc"

    # -------------------------------------------------------------------------
    # FINALIZATION
    # -------------------------------------------------------------------------

    - id: "11"
      name: "Context Analysis"
      file: "step_11_context.js"
      description: "Capture workflow context and execution metadata"
      phase: "finalization"
      enabled: true
      can_parallelize: false
      dependencies: ["19", "20"]

    - id: "16"
      name: "Version Update"
      file: "step_16_version_update.js"
      description: "Bump version (package.json is source of truth)"
      phase: "finalization"
      enabled: true
      can_parallelize: false
      dependencies: ["11"]
      ai_persona: "devops_engineer"

    - id: "17"
      name: "Workflow Summary"
      file: "step_17_summary.js"
      description: "Generate workflow execution summary report"
      phase: "finalization"
      enabled: true
      can_parallelize: false
      dependencies: ["16"]

    - id: "0f"
      name: "Commit Artifacts"
      file: "step_0f_commit_artifacts.js"
      description: "Commit .ai_workflow/ artifacts to git"
      phase: "finalization"
      enabled: true
      can_parallelize: false
      dependencies: ["17"]
      ai_persona: "git_specialist"

    - id: "12"
      name: "Git Finalization"
      file: "step_12_git_finalization.js"
      description: "Generate conventional commit and finalize git state — FINAL STEP"
      phase: "finalization"
      enabled: true
      can_parallelize: false
      required: true
      dependencies: ["0f"]
      ai_persona: "git_specialist"

    # -------------------------------------------------------------------------
    # DISABLED — not applicable for this project
    # -------------------------------------------------------------------------

    - id: "14"
      name: "Prompt Engineering Review"
      file: "step_14_prompt_engineer.js"
      description: "AI prompt quality review"
      phase: "quality"
      enabled: false
      dependencies: []
      reason: "Not an AI/prompt project"

    - id: "11_5"
      name: "AWS LBS Validation"
      file: "step_11_5_aws_lbs_validation.js"
      description: "AWS Location-Based Services infrastructure validation"
      phase: "quality"
      enabled: false
      dependencies: []
      reason: "No AWS infrastructure"

    - id: "11_6"
      name: "AWS Serverless Review"
      file: "step_11_6_aws_serverless_review.js"
      description: "AWS serverless deployment readiness review"
      phase: "quality"
      enabled: false
      dependencies: []
      reason: "No AWS infrastructure"

  phases:
    analysis:
      description: "Documentation updates, consistency, cross-refs, markdown linting"
      steps: ["00", "0b", "01", "02", "02_5", "03", "13"]
    validation:
      description: "Configuration and directory structure validation"
      steps: ["04", "05"]
    testing:
      description: "Test review, generation, and execution"
      steps: ["06", "07", "08"]
    quality:
      description: "TypeScript quality, async/event handling, dependency audit, TUI UX review"
      steps: ["09", "10", "19", "20", "15"]
    finalization:
      description: "Versioning, summary, artifact commit, git — ALWAYS RUNS LAST"
      steps: ["11", "16", "17", "0f", "12"]

# ============================================================================
# VALIDATION THRESHOLDS
# ============================================================================

validation:
  documentation:
    required: true
    min_coverage: 80   # 80% of public component API must be documented
  testing:
    required: true
    min_coverage: 80   # 80% line coverage threshold

# ============================================================================
# GIT & VERSION
# ============================================================================

git:
  tag_on_run: false

version:
  source_of_truth: "package.json"

# ============================================================================
# CHANGE DETECTION
# ============================================================================

change_detection:
  enabled: true
  convention: "conventional_commits"

  types:
    feat:
      description: "New components or component features"
      impact: "high"
      examples:
        - "feat: add LogPanel scrollable list component"
        - "feat(ListPanel): add mouse click selection support"
    fix:
      description: "Bug fixes"
      impact: "medium"
      examples:
        - "fix(ListPanel): correct scroll window calculation"
    docs:
      description: "Documentation only"
      impact: "low"
      examples:
        - "docs: update ListPanel API reference"
    refactor:
      description: "Code refactoring"
      impact: "medium"
      examples:
        - "refactor(ListPanel): extract row rendering helper"
    test:
      description: "Test changes only"
      impact: "low"
      examples:
        - "test: add keyboard navigation tests for ListPanel"
    style:
      description: "Code style/formatting"
      impact: "low"
      examples:
        - "style: align section divider comments"
    chore:
      description: "Maintenance tasks"
      impact: "low"
      examples:
        - "chore: update ink dependency"

# ============================================================================
# DEPLOYMENT CONFIGURATION
# ============================================================================

deploy:
  enabled: true
  script: "scripts/deploy.sh"
  description: "Build TypeScript, commit artifacts, tag release, push, and generate jsDelivr CDN URLs"

# ============================================================================
# CHANGE PATTERNS
# ============================================================================

change_patterns:
  code_files:
    - "src/**/*.tsx"
    - "src/**/*.ts"
    - "helpers/**/*.ts"
  test_files:
    - "test/**/*.ts"
    - "test/**/*.tsx"
  documentation_files:
    - "**/*.md"
    - "docs/**/*"
  config_files:
    - "package.json"
    - "tsconfig*.json"
    - "jest.config.json"
    - ".github/**/*.yml"
    - ".workflow-config.yaml"

# ============================================================================
# CONDITIONAL STEP EXECUTION
# ============================================================================

conditionals:
  step_08_test_execution:
    skip_if:
      - only_docs_changed: true
    run_if:
      - "src/**/*.tsx": changed
      - "test/**/*.ts": changed
    description: "Skip test run if only documentation changed"

  step_05_directory_structure:
    skip_if:
      - no_new_files: true
    cache_duration: 24h
    description: "Cache directory structure scan for 24 hours if no new files"

  step_03_script_validation:
    skip_if:
      - no_ts_changes: true
    run_if:
      - "src/**/*.tsx": changed
    description: "Skip script-reference validation if no TypeScript files changed"
